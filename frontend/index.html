<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X32 Scene Notes</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div x-data="sceneList" class="page">

  <!-- Header -->
  <header class="header">
    <span class="logo">X32</span>
    <span class="header-subtitle">Scene Notes</span>
    <input
      x-model="query"
      class="search-input"
      type="search"
      placeholder="Search…"
      aria-label="Search scenes"
    >
  </header>

  <!-- Variant in-progress banner -->
  <template x-if="variant">
    <div class="variant-banner">
      <div class="variant-banner-info">
        <span>Building variant of <strong x-text="variant.baseName"></strong></span>
        <span class="variant-badge"
              x-text="variant.patches.length + (variant.patches.length === 1 ? ' preset' : ' presets') + ' added'"></span>
        <span class="text-muted" style="font-size:12px">· click any preset below to add it</span>
      </div>
      <div class="variant-banner-actions">
        <button @click="goToBaseScene()" class="btn-secondary" style="font-size:12px;padding:4px 10px">← Back to scene</button>
        <button @click="discardVariant()" class="back-link" style="color:var(--red);font-size:12px">Discard</button>
      </div>
    </div>
  </template>

  <main class="main">

    <!-- Loading -->
    <div x-show="loading" class="status-msg">Loading…</div>

    <!-- Scene table -->
    <table x-show="!loading" class="scene-table">
      <thead>
        <tr>
          <th @click="toggleSort('name')" class="sortable th-name">
            Name
            <span x-show="sortBy==='name'" x-text="sortDir==='asc' ? '↑' : '↓'"></span>
          </th>
          <th @click="toggleSort('has_note')" class="sortable th-note">
            Note
            <span x-show="sortBy==='has_note'" x-text="sortDir==='asc' ? '↑' : '↓'"></span>
          </th>
          <th @click="toggleSort('modified')" class="sortable th-date">
            Modified
            <span x-show="sortBy==='modified'" x-text="sortDir==='asc' ? '↑' : '↓'"></span>
          </th>
        </tr>
      </thead>
      <tbody>
        <template x-for="s in filtered" :key="s.file_path">
          <tr @click="openScene(s.file_path)" class="scene-row">
            <td class="td-name">
              <span class="file-name" x-text="s.file_name"></span>
              <span class="badge" :class="'badge-' + s.file_type" x-text="s.file_type"></span>
            </td>
            <td class="td-note">
              <span x-show="s.has_note" class="note-preview" x-text="s.note_preview"></span>
              <span x-show="!s.has_note" class="text-muted">—</span>
            </td>
            <td class="td-date text-muted" x-text="formatDate(s.last_modified)"></td>
          </tr>
        </template>
        <tr x-show="!loading && filtered.length === 0">
          <td colspan="3" class="status-msg">No scenes match.</td>
        </tr>
      </tbody>
    </table>

    <!-- Orphaned notes -->
    <template x-if="orphaned.length > 0">
      <div class="orphaned-section">
        <div class="orphaned-title">Orphaned Notes</div>
        <div class="text-muted small">These notes have no matching file on disk.</div>
        <template x-for="o in orphaned" :key="o.file_path">
          <div class="orphaned-row">
            <span class="file-name text-muted" x-text="o.file_name || o.file_path"></span>
            <span class="note-preview" x-text="o.note_preview"></span>
          </div>
        </template>
      </div>
    </template>

  </main>

  <!-- Offline banner -->
  <div x-show="offline" class="offline-banner">Server unreachable — retrying…</div>

</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/variant.js"></script>
<script src="components/eq-curve.js"></script>
<script src="js/app.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
